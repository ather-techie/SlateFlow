services:
  slateflow:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - slateflow-data:/data
    environment:
      PORT: ${PORT:-3000}
      DATABASE_PATH: ${DATABASE_PATH:-/data/slateflow.db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set — generate one with `openssl rand -hex 32`}
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  slateflow-data:
